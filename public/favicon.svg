<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="#020208" stroke="url(#gradient)" stroke-width="4"/>
  <circle cx="50" cy="50" r="15" fill="url(#gradient)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#gradient)" stroke-width="2" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#gradient)" stroke-width="1" opacity="0.2">
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="30s" repeatCount="indefinite"/>
  </circle>
</svg>
